<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khana Aur Peena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8f4f2;
      color: #222;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
      background: rgba(248, 244, 242, 0.92);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav a {
      text-decoration: none;
      color: #24503f;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    nav a:hover {
      color: #9b1b63;
    }

    section {
      min-height: 100vh;
      padding: 120px 10% 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1, h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
      url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      color: white;
</html>
